<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oatlog - Sağlıklı Tarifler</title>
    <style>
        :root {
            --oat-bg: #f8f4e3; 
            --oat-green: #dbeede; 
            --oat-beige: #e8e0c8; 
            --oat-text: #5d4037; 
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--oat-bg);
            color: var(--oat-text);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* YÜZEN İKON ARKA PLANI (HOMOJEN VE ÇOKLU DAĞILIM) */
        .icon-background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0; 
            overflow: hidden;
        }

        .fixed-icon {
            position: absolute;
            width: 50px;
            height: auto;
            opacity: 0.2; 
        }

        .content-wrapper {
            position: relative;
            z-index: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* LOGOLU BAŞLIK KONTEYNERİ */
        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px; 
            margin-bottom: 50px;
            margin-top: 20px;
        }

        /* LOGOLARI BÜYÜTEN KISIM */
        .title-logo {
            height: 100px; 
            width: auto;
            object-fit: contain;
            transform: scale(1.4); 
        }

        h1.oatlog-title {
            font-size: 4rem; 
            color: var(--oat-text);
            margin: 0 20px; 
            position: relative;
            z-index: 2;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px; 
            width: 100%;
            max-width: 800px; 
            margin-bottom: 20px;
        }

        /* 1. KARE VE CANLI KATEGORİ KARTLARI */
        .category-box {
            background-color: var(--oat-green);
            aspect-ratio: 1 / 1; 
            border-radius: 25px; 
            cursor: pointer;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-title {
            background-color: rgba(248, 244, 227, 0.95); 
            color: var(--oat-text);
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: bold;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            pointer-events: none;
        }

        .category-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 1; 
            filter: none; 
            transition: transform 0.4s;
            z-index: 1;
        }

        .category-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }
        
        .category-box:hover::before {
            transform: scale(1.05); 
        }

        #kahvalti-box::before { background-image: url('kahvalti.jpg'); }
        #ana-tabak-box::before { background-image: url('ana.jpg'); }
        #tuzlu-box::before { background-image: url('tuzlu.jpg'); }
        #tatli-box::before { background-image: url('tatli.jpg'); }

        /* 2. AÇILIR LİSTE (AKORDEON) STİLLERİ */
        .accordion-content {
            display: none;
            grid-column: span 2;
            padding: 40px 30px;
            border-radius: 25px;
            margin-top: -15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .accordion-content::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.9; 
            z-index: -1;
        }

        #kahvalti-accordion::before { background-image: url('kahvalti.jpg'); }
        #ana-tabak-accordion::before { background-image: url('ana.jpg'); }
        #tuzlu-accordion::before { background-image: url('tuzlu.jpg'); }
        #tatli-accordion::before { background-image: url('tatli.jpg'); }

        .accordion-content.active {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        /* 3. DOLGULU TARİF BUTONLARI */
        .recipe-btn {
            background-color: var(--oat-beige); 
            border: 2px solid #ffffff; 
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Verdana', sans-serif;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--oat-text);
            text-align: center;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.25); 
            position: relative;
            z-index: 1;
        }

        .recipe-btn:hover { 
            background-color: #dbd2c0; 
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        /* 4. MODAL VE KAYDIRMA (SCROLL) ÇÖZÜMÜ */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); 
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px); 
        }

        .modal-content {
            background-color: var(--oat-bg);
            padding: 50px 30px 50px 50px; 
            border-radius: 30px;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 2.5rem;
            color: var(--oat-text);
            cursor: pointer;
            z-index: 3; 
        }

        .modal-content::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(248, 244, 227, 0.93);
            border-radius: 30px;
            z-index: 1; 
        }

        .recipe-detail {
            position: relative;
            z-index: 2; 
            max-height: 70vh; 
            overflow-y: auto; 
            padding-right: 20px; 
        }

        .recipe-detail::-webkit-scrollbar { width: 6px; }
        .recipe-detail::-webkit-scrollbar-track { background: transparent; }
        .recipe-detail::-webkit-scrollbar-thumb { background: rgba(93, 64, 55, 0.2); border-radius: 10px; }
        .recipe-detail::-webkit-scrollbar-thumb:hover { background: rgba(93, 64, 55, 0.4); }

        .modal-kahvalti { background-image: url('kahvalti.jpg'); }
        .modal-ana-tabak { background-image: url('ana.jpg'); }
        .modal-tuzlu { background-image: url('tuzlu.jpg'); }
        .modal-tatli { background-image: url('tatli.jpg'); }

        .recipe-detail h2 { font-size: 2rem; margin-top: 0; margin-bottom: 25px; color: var(--oat-text); }
        .recipe-detail h3 { font-size: 1.3rem; margin-top: 20px; margin-bottom: 12px; border-bottom: 2px solid var(--oat-beige); display: inline-block; padding-bottom: 3px; }
        
        .recipe-detail ul, .recipe-detail ol { padding-left: 40px; margin-left: 0; }
        .recipe-detail li { margin-bottom: 12px; line-height: 1.7; font-family: 'Verdana', sans-serif; font-size: 0.98rem; }
        
        .recipe-link {
            font-family: 'Verdana', sans-serif;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--oat-text);
            text-decoration: underline;
            transition: color 0.2s;
        }
        .recipe-link:hover { color: #8e6c5c; }

        .copyright-text { font-size: 0.8rem; color: #b1a094; margin-top: auto; padding-top: 50px; text-align: center; }
    </style>
</head>

        function toggleAccordion(categoryId) {
            const content = document.getElementById(categoryId + '-accordion');
            const allContents = document.querySelectorAll('.accordion-content');
            allContents.forEach(c => {
                if (c.id !== categoryId + '-accordion') {
                    c.classList.remove('active');
                    c.style.display = 'none';
                }
            });
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                content.style.display = 'none';
            } else {
                content.classList.add('active');
                content.style.display = 'grid';
            }
        }

        function cleanText(text) {
            return text.replace(/\+\]/g, '').trim();
        }

        function showRecipe(recipeName, categoryId) {
            const recipe = recipes[recipeName];
            const detailArea = document.getElementById('recipe-detail-area');
            const modal = document.getElementById('recipe-modal');
            const modalContent = modal.querySelector('.modal-content');

            if (!recipe) return;

            modalContent.className = 'modal-content'; 

            if (categoryId) {
                modalContent.classList.add('modal-' + categoryId);
            }

            let htmlContent = `
                <h2>${recipeName}</h2>
                <div class="recipe-detail">
                    <h3>Malzemeler:</h3>
                    <ul>${recipe.ingredients.map(ing => `<li>${cleanText(ing)}</li>`).join('')}</ul>
                    <h3>Yapılışı:</h3>
                    <ol>${recipe.instructions.map(ins => `<li>${cleanText(ins)}</li>`).join('')}</ol>
                    
                    ${recipe.url ? `
                        <h3>Tarif Linki:</h3>
                        <p><a href="${recipe.url}" target="_blank" class="recipe-link">${recipe.link}</a></p>
                    ` : ''}
                </div>
            `;

            detailArea.innerHTML = htmlContent;
            modal.style.display = 'flex'; 
        }

        function closeModal() {
            document.getElementById('recipe-modal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('recipe-modal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
